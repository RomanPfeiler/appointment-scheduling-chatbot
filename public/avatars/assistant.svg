<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Calendar body -->
  <rect x="10" y="18" width="60" height="54" rx="5" ry="5" fill="#EC0000"/>
  <!-- Calendar header bar -->
  <rect x="10" y="18" width="60" height="18" rx="5" ry="5" fill="#EC0000"/>
  <rect x="10" y="28" width="60" height="8" fill="#EC0000"/>
  <!-- Header separator -->
  <rect x="10" y="34" width="60" height="3" fill="#C00000"/>
  <!-- Binding pegs -->
  <rect x="26" y="10" width="8" height="18" rx="4" ry="4" fill="#C00000"/>
  <rect x="46" y="10" width="8" height="18" rx="4" ry="4" fill="#C00000"/>
  <!-- Grid dots (days) -->
  <!-- Row 1 -->
  <rect x="18" y="44" width="8" height="7" rx="1" fill="white" opacity="0.9"/>
  <rect x="30" y="44" width="8" height="7" rx="1" fill="white" opacity="0.9"/>
  <rect x="42" y="44" width="8" height="7" rx="1" fill="white" opacity="0.9"/>
  <rect x="54" y="44" width="8" height="7" rx="1" fill="white" opacity="0.9"/>
  <!-- Row 2 -->
  <rect x="18" y="55" width="8" height="7" rx="1" fill="white" opacity="0.9"/>
  <rect x="30" y="55" width="8" height="7" rx="1" fill="white" opacity="0.9"/>
  <rect x="42" y="55" width="8" height="7" rx="1" fill="white" opacity="0.9"/>
</svg>

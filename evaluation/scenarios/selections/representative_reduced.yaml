name: representative_reduced
description: >
  Cost-tuned representative profile — Tiers 1–2 cut to 5/tier, Tiers 3–7 full
  (10/tier), reps=2. 60 scenarios × 2 = 120 conversations/stage (vs 210).
tiers: [1, 2, 3, 4, 5, 6, 7]
max_per_tier: 10        # documentary only — include_ids below takes precedence
seed: 42                # documentary — the include_ids were derived from the seed-42 draw
reps: 2
notes: |
  Phase B reduced profile. The binding constraint is Gemini API cost, not
  CPU/wall-clock, so the cut falls on the cheapest, lowest-signal tiers
  (cooperative-persona Tiers 1–2) while the negotiation / grounding /
  out-of-scope tiers (3–7) stay whole.

  Construction (comparability — EVALUATION_FRAMEWORK §10):
  - include_ids is a DETERMINISTIC SUBSET of the full representative.yaml
    seed-42 draw: Tiers 1–2 = the first 5 ids in that tier's seeded sample;
    Tiers 3–7 = all 10. No schema/runner change (include_ids derived rather
    than extending max_per_tier to a per-tier map).
  - Identical selection across all four stages (baseline / arm1 / arm2 / arm3)
    because the ids are fixed here — every stage runs the SAME 60 scenarios,
    so the comparison is paired.
  - booking_reachable=false coverage PRESERVED: the 13 unreachable cases of the
    full draw (Tier 2 ×1, Tier 3 ×2, Tier 7 ×10) are all retained. The single
    Tier-2 unreachable case already falls inside the first-5 cut, so no manual
    swap was needed.

  Per-tier counts: T1 5, T2 5, T3 10, T4 10, T5 10, T6 10, T7 10 = 60.
  reps=2 -> 120 conversations/stage. Drop to reps=1 ONLY if the cost estimate
  exceeds budget; if so, record in the report that representative CIs rest on
  single runs (lean on per-tier patterns over CI overlap).

notes: |
  Phase B pre-baseline gate. Spans all 7 tiers (3/tier = 21 conversations) so
  the doom-loop / runaway-prone tiers (3–7) are exercised before committing to
  the full reduced baseline — the natural "first 20" of the representative draw
  is Tier 1+2 only and would miss them. Also the first live exercise of the
  per-scenario wall-clock guard (2026-06-06). Cheap go/no-go: scenarios finalize
  cleanly, fixtures resolve against reference_date 2026-06-01, booking in the
  smoke ballpark (~64%), no runaway/dead-end spike in the hard tiers.
